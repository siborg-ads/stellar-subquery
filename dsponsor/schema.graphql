type Increment @entity {
  id: ID!
  newValue: BigInt!
}

type Initialization @entity {
  id: ID!
  nft_factory: String,
  native_xlm: String,
  bps: BigInt,
  admin: String,
}

type OFFER @entity {
  id: ID!
  nft_contract: String,
  offer_id: BigInt
}

type Payment @entity {
  id: ID!
  from: BigInt
  to: String
  amount: BigInt
  currency: String
}

type Proposal @entity {
  id: ID!
  nft_contract: String
  token_id: BigInt
  to: String
  currency: String
  price: BigInt
}

type Review @entity {
  id: ID!
  offer_id: BigInt
  token_id: BigInt
  proposal_id: BigInt
  ad_parameter: String,
  validated: Boolean,
  reason: String
}

# Marketplace Events
type MarketplaceInit @entity {
  id: ID!
  admin: String
  native_xlm: String
  fee_bps: BigInt
}

type Listing @entity {
  id: ID!
  listing_id: BigInt
  nft_contract: String
  token_id: BigInt
  price: BigInt
  seller: String
  currency: String
  active: Boolean
  created_at: BigInt
}

type ListingCancel @entity {
  id: ID!
  listing_id: BigInt
  cancelled_at: BigInt
}

type ListingSold @entity {
  id: ID!
  listing_id: BigInt
  buyer: String
  sold_at: BigInt
}

type Auction @entity {
  id: ID!
  auction_id: BigInt
  nft_contract: String
  token_id: BigInt
  reserve_price: BigInt
  seller: String
  currency: String
  active: Boolean
  created_at: BigInt
}

type Bid @entity {
  id: ID!
  auction_id: BigInt
  bidder: String
  amount: BigInt
  bid_at: BigInt
}

type AuctionSold @entity {
  id: ID!
  auction_id: BigInt
  winner: String
  final_price: BigInt
  sold_at: BigInt
}

type AuctionNoBid @entity {
  id: ID!
  auction_id: BigInt
  ended_at: BigInt
}